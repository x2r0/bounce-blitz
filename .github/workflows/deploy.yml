name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build (minify JS, copy assets)
        run: |
          npm install --no-save esbuild

          # Copy non-JS assets unchanged
          mkdir -p dist/assets
          cp index.html dist/
          cp -r assets/* dist/assets/

          # Minify every JS file, preserving directory structure
          find . -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './dist/*' \
            -not -path './publish/*' \
            | while read -r f; do
              mkdir -p "dist/$(dirname "$f")"
              npx esbuild "$f" --minify --outfile="dist/${f}"
            done

      - name: Create distribution zip
        run: cd dist && zip -r ../bounceblitz.zip .

      - name: Upload distribution zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: bounceblitz
          path: bounceblitz.zip

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bounceblitz.zip
